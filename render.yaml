databases:
  - name: kso-postgres
    databaseName: kso
    plan: free

services:
  - type: web
    name: kso-backend
    runtime: node
    rootDir: backend
    plan: free
    autoDeploy: true
    healthCheckPath: /health/live
    buildCommand: npm ci && npm run prisma:generate && npm run build
    preDeployCommand: npm run prisma:deploy
    startCommand: npm start
    envVars:
      - key: NODE_ENV
        value: production
      - key: DATABASE_URL
        fromDatabase:
          name: kso-postgres
          property: connectionString
      - key: FRONTEND_URL
        value: https://kso-frontend.onrender.com
      - key: PUBLIC_BASE_URL
        value: https://kso-backend.onrender.com
      - key: JWT_SECRET
        generateValue: true
      - key: JWT_REFRESH_SECRET
        generateValue: true
      - key: JWT_EXPIRES_IN
        value: 15m
      - key: REFRESH_TOKEN_EXPIRES_IN
        value: 30d
      - key: AUTH_COOKIE_SECURE
        value: "true"
      - key: AUTH_COOKIE_SAME_SITE
        value: none
      - key: RATE_LIMIT_GLOBAL_MAX
        value: "1500"
      - key: RATE_LIMIT_GLOBAL_WINDOW_MS
        value: "900000"
      - key: RATE_LIMIT_AUTH_MAX
        value: "20"
      - key: RATE_LIMIT_AUTH_WINDOW_MS
        value: "900000"
      - key: RATE_LIMIT_UPLOAD_MAX
        value: "30"
      - key: RATE_LIMIT_UPLOAD_WINDOW_MS
        value: "900000"
      - key: FILE_STORAGE_DRIVER
        value: cloudinary
      - key: CLOUDINARY_CLOUD_NAME
        sync: false
      - key: CLOUDINARY_API_KEY
        sync: false
      - key: CLOUDINARY_API_SECRET
        sync: false
      - key: CLOUDINARY_FOLDER
        value: kso/chat
      - key: PASSWORD_RESET_TOKEN_EXPIRES_MINUTES
        value: "30"
      - key: PASSWORD_RESET_BASE_URL
        value: https://kso-frontend.onrender.com/reset-password
      - key: RESEND_API_KEY
        sync: false
      - key: MAIL_FROM
        sync: false
      - key: METRICS_TOKEN
        sync: false
      - key: OBSERVABILITY_WEBHOOK_URL
        sync: false
      - key: LOG_LEVEL
        value: info

  - type: web
    name: kso-frontend
    runtime: static
    rootDir: frontend
    plan: free
    autoDeploy: true
    buildCommand: npm ci && npm run build
    staticPublishPath: dist
    routes:
      - type: rewrite
        source: /*
        destination: /index.html
    envVars:
      - key: VITE_API_BASE_URL
        value: https://kso-backend.onrender.com/api
      - key: VITE_SITE_URL
        value: https://kso-frontend.onrender.com
