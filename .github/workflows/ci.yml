name: CI

on:
  push:
    branches:
      - main
  pull_request:

jobs:
  lint-build-smoke:
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: kso_ci
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U postgres -d kso_ci"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    env:
      DATABASE_URL: postgresql://postgres:postgres@localhost:5432/kso_ci?schema=public
      JWT_SECRET: ci_access_secret_very_long_for_tests_only_12345
      JWT_REFRESH_SECRET: ci_refresh_secret_very_long_for_tests_only_12345
      FRONTEND_URL: http://kso.digital-get.com
      PUBLIC_BASE_URL: http://127.0.0.1:4100
      AUTH_COOKIE_SECURE: "false"
      AUTH_COOKIE_SAME_SITE: lax
      FILE_STORAGE_DRIVER: local
      NODE_ENV: test
      PORT: "4100"
      VITE_API_BASE_URL: http://localhost:4100/api

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: |
            package-lock.json
            backend/package-lock.json
            frontend/package-lock.json

      - name: Install root dependencies
        run: npm ci

      - name: Install backend dependencies
        run: npm ci --prefix backend

      - name: Install frontend dependencies
        run: npm ci --prefix frontend

      - name: Generate Prisma client
        run: npm run prisma:generate --prefix backend

      - name: Apply migrations
        run: npm run prisma:deploy --prefix backend

      - name: Lint
        run: npm run lint

      - name: Build
        run: npm run build

      - name: Smoke test
        run: npm run smoke:test
